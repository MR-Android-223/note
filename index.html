<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ملاحظاتي الذكية Cloud</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="font-size:1.4rem; font-weight:700; margin-bottom:10px; color:#1e293b;">تسجيل الدخول مطلوب</h2>
        <p style="color:#64748b; font-size:0.9rem;">لحفظ ملاحظاتك بشكل آمن ومزامنتها فوراً</p>

        <button class="google-btn" onclick="startFirebaseLogin()">
            <div class="google-icon-wrapper">
                <svg class="google-icon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            </div>
            <span style="flex:1; text-align:center;">المتابعة باستخدام حساب جوجل</span>
        </button>
        <div id="loginStatus" style="margin-top:15px; font-size:0.85rem; color:#4f46e5; display:none; font-weight:600;">جاري الاتصال...</div>
    </div>
</div>

<div class="header">
  <button class="hdr-btn hdr-btn-left" onclick="handleSettingsOpen()">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  
  <div class="cloud-status">
      <div id="syncLoader" class="sync-loader"></div>
      <span id="syncText"></span>
  </div>

  <div class="header-badge">ملاحظاتي الذكية</div>
  <h1>مذكّراتي</h1>
  <p>Mohammad Al Boushi</p>
  <button id="mainSelectBtn" onclick="toggleMainSelectionMode(true)">تحديد</button>
</div>

<div id="navBar">
  <button class="back-btn" onclick="window.history.back()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    رجوع
  </button>
  <span id="currentPathTitle" class="current-path"></span>
</div>

<div id="selToolbar" class="sel-toolbar">
  <button class="toolbar-btn primary" onclick="handleSelectionAction('selectAll')">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="selAllText">الكل</span>
  </button>
  <button class="toolbar-btn danger" onclick="deleteSelectedMainNotesWrapper()">
    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
    حذف
  </button>
  <button class="toolbar-btn opt" onclick="showCtxSheet(null)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="12" cy="19" r="2"/></svg>
    خيارات
  </button>
  <button class="toolbar-btn" onclick="toggleMainSelectionMode(false)">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    إلغاء
  </button>
</div>

<div class="search-wrap">
  <svg class="si" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <span id="clearSearchBtn" class="clear-btn" onclick="clearSearch()">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </span>
  <input type="text" id="searchInput" placeholder="ابحث في عناوينك..." oninput="searchNotes()" autocomplete="off">
</div>

<div id="notesGrid" class="grid-container"></div>

<button id="mainFab" class="fab" onclick="showCreateMenu()">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>
<button id="pasteFloatingBtn" class="paste-fab" onclick="pasteItemsHere()">
  <svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
  لصق هنا
</button>

<div id="createMenu">
  <button class="create-item" onclick="createItemWrapper('folder')">
    <div class="ci-icon" style="background:rgba(245,158,11,.12)"><svg viewBox="0 0 24 24" style="stroke:#f59e0b"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
    مجلد جديد
  </button>
  <button class="create-item" onclick="createItemWrapper('note')">
    <div class="ci-icon" style="background:rgba(124,58,237,.12)"><svg viewBox="0 0 24 24" style="stroke:#7c3aed"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
    ملاحظة جديدة
  </button>
</div>

<div id="ctxOverlay" onclick="closeAllMenus()"></div>

<div id="ctxSheet" class="menu-sheet">
  <div class="menu-handle"></div>
  <div class="menu-title">خيارات</div>
  <button class="menu-item blue" id="ctxLockBtn" onclick="handleMenuAction('toggleLock')">
    <div class="m-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <span class="m-label" id="ctxLockLabel">قفل / فتح</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>
  <button class="menu-item violet" id="ctxMoveBtn" onclick="handleMenuAction('move')">
    <div class="m-icon"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><polyline points="9 14 12 17 15 14"/></svg></div>
    <span class="m-label">نقل</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>
  <button class="menu-item slate" id="ctxCopyBtn" onclick="handleMenuAction('copy')">
    <div class="m-icon"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>
    <span class="m-label">نسخ</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>
  <button class="menu-item green" id="ctxHomeBtn" onclick="handleMenuAction('moveToRoot')" style="display:none">
    <div class="m-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <span class="m-label">إضافة للرئيسية</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>
  <button class="menu-item amber" id="ctxEditBtn" onclick="handleMenuAction('edit')">
    <div class="m-icon"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
    <span class="m-label">تعديل الاسم</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>
  <div class="menu-sep"></div>
  <button class="menu-item red" onclick="handleMenuAction('delete')">
    <div class="m-icon"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></div>
    <span class="m-label">حذف</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>
</div>

<div id="subCtxSheet" class="menu-sheet">
  <div class="menu-handle"></div>
  <button class="menu-item amber" onclick="handleSubNoteAction('edit')">
    <div class="m-icon"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
    <span class="m-label">تعديل</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>
  <button class="menu-item slate" onclick="handleSubNoteAction('copy')">
    <div class="m-icon"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>
    <span class="m-label">نسخ</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>
  <div class="menu-sep"></div>
  <button class="menu-item red" onclick="handleSubNoteAction('delete')">
    <div class="m-icon"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></div>
    <span class="m-label">حذف</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>
</div>

<div id="dragSheet" class="menu-sheet">
  <div class="menu-handle"></div>
  <div class="menu-title">خيار النقل</div>
  <div class="drag-grid">
    <div class="drag-card move-c" onclick="resolveDragAction('move')">
      <div class="dc-icon">📂</div>
      <div class="dc-title">نقل للداخل</div>
      <div class="dc-desc">ضع داخل المجلد</div>
    </div>
    <div class="drag-card swap-c" onclick="resolveDragAction('swap')">
      <div class="dc-icon">⇄</div>
      <div class="dc-title">تبديل</div>
      <div class="dc-desc">تغيير الترتيب</div>
    </div>
  </div>
  <div style="padding:10px 20px 0">
    <button class="btn btn-ghost" style="width:100%" onclick="resolveDragAction(null)">إلغاء</button>
  </div>
</div>

<div id="settingsSheet" class="menu-sheet">
  <div class="menu-handle"></div>
  
  <div class="menu-title">سحابة حسابي</div>
  <div id="googleLoginBtnArea">
      <button class="menu-item blue" onclick="openLoginOverlay()">
          <div class="m-icon"><svg viewBox="0 0 24 24"><path d="M22 12c0-.85-.08-1.68-.22-2.48H12v4.69h5.68c-.24 1.5-1.12 2.78-2.39 3.64v3.02h3.86c2.26-2.09 3.56-5.17 3.56-8.87z" fill="#4285F4"/><path d="M12 22c2.81 0 5.17-.93 6.9-2.52l-3.86-3.02c-.93.63-2.12 1-3.04 1-2.34 0-4.32-1.58-5.02-3.71H3.02v3.12C4.75 20.32 8.08 22 12 22z" fill="#34A853"/><path d="M6.98 13.75c-.18-.53-.28-1.1-.28-1.75s.1-1.22.28-1.75V7.13H3.02C2.37 8.43 2 9.94 2 12s.37 3.57 1.02 4.87l3.96-3.12z" fill="#FBBC05"/><path d="M12 5.38c1.53 0 2.91.53 3.98 1.51l2.98-2.98C17.17 2.15 14.81 1 12 1 8.08 1 4.75 2.68 3.02 6.13l3.96 3.12c.7-2.13 2.68-3.87 5.02-3.87z" fill="#EA4335"/></svg></div>
          <span class="m-label">تسجيل الدخول</span>
          <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </button>
  </div>
  <div id="googleSyncActions" style="display:none;">
      <button class="menu-item slate" onclick="handleFirebaseLogout()">
          <div class="m-icon" id="googleLogoutIcon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
          <span class="m-label">تسجيل خروج</span>
          <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </button>
  </div>

  <div class="menu-sep"></div>
  <div class="menu-title">إعدادات التطبيق</div>
  
  <button class="menu-item violet" onclick="downloadJSON()">
    <div class="m-icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
    <span class="m-label">تنزيل نسخة</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>

  <button class="menu-item green" onclick="importJSON()">
    <div class="m-icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
    <span class="m-label">استيراد ملف</span>
    <input type="file" id="jsonFileInput" style="display:none" accept=".json" onchange="handleJSONImport(event)">
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>

  <button class="menu-item slate" onclick="exportDataManual()">
    <div class="m-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
    <span class="m-label">نسخ احتياطي (كود)</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>

  <button class="menu-item violet" onclick="shareBackupText()">
    <div class="m-icon"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div>
    <span class="m-label">مشاركة النص</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>

  <button class="menu-item amber" onclick="importDataPaste()">
    <div class="m-icon"><svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg></div>
    <span class="m-label">استيراد (كود)</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>

  <button class="menu-item blue" id="setPassBtn" onclick="setAppPassword()">
    <div class="m-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <span class="m-label">تعيين قفل للتطبيق</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>
  <button class="menu-item red" id="removePassBtn" onclick="removeAppPassword()" style="display:none">
    <div class="m-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg></div>
    <span class="m-label">حذف كلمة المرور</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>

  <div class="menu-sep"></div>
  <button class="menu-item red" onclick="deleteAllData()">
    <div class="m-icon"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></div>
    <span class="m-label">حذف جميع البيانات</span>
    <div class="m-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </button>
  
  <div style="padding:12px 20px 0">
    <button class="btn btn-ghost" style="width:100%" onclick="closeSheet('settingsSheet')">إغلاق</button>
  </div>
</div>

<div id="detailsModal" class="modal-full">
  <div class="details-topbar">
    <button class="back-btn" onclick="window.history.back()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      رجوع
    </button>
    <button class="toolbar-btn" id="selectBtn" onclick="toggleSelectionMode(true)">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      تحديد
    </button>
    <button class="toolbar-btn primary" id="selectAllBtn" style="display:none" onclick="selectAllSubNotes()">الكل</button>
    <button class="toolbar-btn" id="cancelSelectionBtn" style="display:none" onclick="toggleSelectionMode(false)">إلغاء</button>
    <button class="toolbar-btn danger" id="deleteSubBtn" style="display:none" onclick="deleteSelectedSubNotesWrapper()">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      حذف
    </button>
  </div>
  <div class="sub-search-wrap">
    <input type="text" id="subSearchInput" placeholder="🔍  بحث داخل القائمة..." oninput="renderSubNotes()" autocomplete="off">
  </div>
  <span class="note-title-label" id="modalTitle">عنوان</span>
  <ul id="subNotesList" class="sub-notes-list"></ul>
  <div class="input-area">
    <textarea id="newSubNoteInput" placeholder="أضف نصاً جديداً..."></textarea>
    <button class="add-btn" onclick="addSubNote()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
</div>

<div id="editModal" class="modal-full">
  <div class="edit-topbar">
    <button class="btn btn-ghost" style="flex:0;padding:9px 14px" onclick="handleEditBack()">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#64748b;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="15 18 9 12 15 6"/></svg>
      رجوع
    </button>
    <div style="flex:1"></div>
    <button class="btn btn-ghost" style="flex:0;padding:9px 12px" id="editSearchBtn" onclick="toggleEditSearch()">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#64748b;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="btn btn-ghost" id="btnUndo" style="flex:0;padding:9px 12px;opacity:.4" onclick="undo()">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#64748b;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
    </button>
    <button class="btn btn-ghost" id="btnRedo" style="flex:0;padding:9px 12px;opacity:.4" onclick="redo()">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#64748b;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>
    </button>
    <button class="btn btn-primary" style="flex:0;padding:9px 16px" id="editSaveBtn">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px"><polyline points="20 6 9 17 4 12"/></svg>
      حفظ
    </button>
  </div>
  <div class="edit-search-bar" id="editSearchBar">
    <button class="es-btn" onclick="findInText('prev')"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></button>
    <button class="es-btn" onclick="findInText('next')"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
    <input type="text" id="inTextSearchInput" class="es-inp" placeholder="بحث في النص..." onkeyup="if(event.key==='Enter') findInText('next')">
    <button class="es-btn" onclick="toggleEditSearch()" style="background:#fee2e2;border-color:#fca5a5"><svg viewBox="0 0 24 24" style="stroke:#ef4444"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <textarea id="editTextArea" style="flex:1;border:none;padding:18px 16px;font-family:'IBM Plex Sans Arabic';font-size:1rem;line-height:1.8;color:#1e293b;background:#fff;resize:none;text-align:right;overflow-y:auto" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
</div>

<div id="inputModal" class="modal">
  <div class="modal-card">
    <p id="inputMessage" class="modal-msg"></p>
    <input type="text" id="modalInputSingle" class="inp" style="display:none" autocomplete="off">
    <textarea id="modalInputArea" class="inp-area" style="display:none;height:140px" spellcheck="false"></textarea>
    <div class="modal-actions">
      <button id="inputCopyBtn" class="btn btn-copy" style="display:none" onclick="copyModalContent()">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        نسخ
      </button>
      <button id="inputPasteBtn" class="btn btn-success" style="display:none" onclick="pasteModalContent()">
        <svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
        لصق
      </button>
      <button id="inputBtn" class="btn btn-primary">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        حفظ
      </button>
      <button class="btn btn-ghost" onclick="closeInputModal()">إلغاء</button>
    </div>
  </div>
</div>

<div id="confirmModal" class="modal">
  <div class="modal-card">
    <p id="confirmMessage" class="modal-msg"></p>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="hideConfirmModal(true)">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        تأكيد
      </button>
      <button class="btn btn-ghost" onclick="hideConfirmModal(false)">إلغاء</button>
    </div>
  </div>
</div>

<div id="passwordModal" class="modal">
  <div class="modal-card">
    <p class="modal-msg">🔐  أدخل كلمة المرور</p>
    <input type="password" id="modalPasswordInput" class="inp inp-pass" placeholder="• • • • • •">
    <div class="modal-actions">
      <button id="passwordBtn" class="btn btn-primary">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        تأكيد
      </button>
      <button class="btn btn-ghost" onclick="hidePasswordModal(null)">إلغاء</button>
    </div>
  </div>
</div>

<div id="saveConfirmModal" class="modal">
  <div class="modal-card">
    <p class="modal-msg">هل تريد حفظ التعديلات؟</p>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="resolveSaveConfirm(true)">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        نعم، احفظ
      </button>
      <button class="btn btn-ghost" onclick="resolveSaveConfirm(false)">تجاهل</button>
    </div>
  </div>
</div>

<div id="notifToast">
  <svg id="notifIcon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="notifMsg"></span>
</div>
<script src="script.js"></script>
</body>
</html>

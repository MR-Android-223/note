<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ملاحظاتي الذكية Cloud</title>

<script src="https://accounts.google.com/gsi/client" onload="initGoogleLib()" async defer></script>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none;margin:0;padding:0}
input,textarea{-webkit-user-select:text!important;user-select:text!important}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:#f0f2f7;color:#1a1a2e;min-height:100vh;padding-bottom:100px;-webkit-user-select:none;user-select:none;overflow-x:hidden}

/* ── HEADER ── */
.header{background:linear-gradient(160deg,#4f46e5,#7c3aed);padding:48px 20px 28px;text-align:center;position:relative;border-radius:0 0 32px 32px;box-shadow:0 8px 30px rgba(79,70,229,.35)}
.header h1{color:#fff;font-size:1.9rem;font-weight:700;margin-bottom:3px}
.header p{color:rgba(255,255,255,.7);font-size:.85rem;font-weight:400}
.header-badge{display:inline-block;background:rgba(255,255,255,.15);color:#fff;font-size:.7rem;font-weight:600;letter-spacing:.1em;padding:4px 12px;border-radius:100px;margin-bottom:10px;border:1px solid rgba(255,255,255,.2)}

/* Cloud Status */
.cloud-status {position:absolute; top:20px; left:60px; font-size:0.75rem; color:rgba(255,255,255,0.9); display:flex; align-items:center; gap:6px; font-weight:600;}
.sync-loader {display:none; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top:2px solid #fff; border-radius:50%; animation:spin 0.8s linear infinite;}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Header icon buttons */
.hdr-btn{position:absolute;top:48px;width:40px;height:40px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.hdr-btn:active{background:rgba(255,255,255,.3)}
.hdr-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-btn-left{left:16px}
#mainSelectBtn{position:absolute;top:48px;right:16px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:12px;color:#fff;font-family:'IBM Plex Sans Arabic';font-weight:600;font-size:.82rem;padding:8px 14px;cursor:pointer}

/* ── NAV BAR ── */
#navBar{display:none;align-items:center;gap:10px;background:#fff;padding:10px 16px;margin:14px 16px 0;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.back-btn{display:flex;align-items:center;gap:6px;background:#f0f2f7;border:none;padding:8px 14px;border-radius:10px;cursor:pointer;font-family:'IBM Plex Sans Arabic';font-weight:600;font-size:.85rem;color:#4f46e5;transition:background .15s}
.back-btn:active{background:#e0e2f0}
.back-btn svg{width:16px;height:16px;stroke:#4f46e5;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.current-path{color:#64748b;font-size:.85rem;font-weight:500;margin-right:auto}

/* ── SELECTION TOOLBAR ── */
.sel-toolbar{display:none;align-items:center;justify-content:center;gap:6px;padding:0 12px;margin-top:12px;flex-wrap:wrap}
.sel-toolbar.active{display:flex}
.toolbar-btn{display:flex;align-items:center;gap:4px;background:#fff;border:1.5px solid #e2e8f0;padding:8px 12px;border-radius:12px;cursor:pointer;font-family:'IBM Plex Sans Arabic';font-weight:600;font-size:.8rem;color:#374151;box-shadow:0 2px 6px rgba(0,0,0,.05);transition:all .15s;flex:1;justify-content:center;}
.toolbar-btn:active{transform:scale(.95)}
.toolbar-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.toolbar-btn.danger{color:#ef4444;border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.04)}
.toolbar-btn.primary{color:#4f46e5;border-color:rgba(79,70,229,.25);background:rgba(79,70,229,.04)}
.toolbar-btn.opt{color:#8b5cf6;border-color:rgba(139,92,246,.25);background:rgba(139,92,246,.04)}

/* ── SEARCH ── */
.search-wrap{position:relative;margin:16px 16px 0}
.search-wrap svg.si{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:#94a3b8;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
#searchInput{width:100%;padding:13px 44px 13px 44px;background:#fff;border:2px solid transparent;border-radius:16px;font-family:'IBM Plex Sans Arabic';font-size:.95rem;color:#1a1a2e;text-align:right;box-shadow:0 2px 12px rgba(0,0,0,.07);transition:all .25s}
#searchInput::placeholder{color:#94a3b8}
#searchInput:focus{border-color:#4f46e5;box-shadow:0 0 0 4px rgba(79,70,229,.1)}
.clear-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:28px;height:28px;background:#e2e8f0;border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer}
.clear-btn svg{width:14px;height:14px;stroke:#64748b;fill:none;stroke-width:2.5;stroke-linecap:round}

/* ── GRID ── */
.grid-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;padding:16px;align-items:start}
.note-card{background:#fff;border-radius:22px;padding:16px 12px 12px;height:165px;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;text-align:center;box-shadow:0 3px 14px rgba(0,0,0,.08);border:2px solid transparent;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,border-color .2s;touch-action:pan-y;overflow:hidden}
.note-card:active{transform:scale(.96)}
.note-card.is-folder{background:linear-gradient(160deg,#fffbeb,#fff);border-color:rgba(245,158,11,.2)}
.note-card.is-note{background:linear-gradient(160deg,#f5f3ff,#fff);border-color:rgba(124,58,237,.15)}
.note-card.selected{border-color:#10b981;background:linear-gradient(160deg,#ecfdf5,#fff)}
.note-card.dragging{opacity:.4;transform:scale(.93)}
.note-card.drag-target,.note-card.drag-target-hover{border-color:#4f46e5;background:linear-gradient(160deg,#eef2ff,#fff);transform:scale(1.04)}
.note-card.dragging-mobile{position:fixed;z-index:9999;opacity:.92;box-shadow:0 20px 50px rgba(0,0,0,.25);pointer-events:none;width:155px;height:165px;border:2px solid #4f46e5}

.card-icon-wrap{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;margin-top:4px}
.card-icon-wrap.folder-ico{background:linear-gradient(135deg,#f59e0b,#d97706)}
.card-icon-wrap.note-ico{background:linear-gradient(135deg,#7c3aed,#6d28d9)}
.card-icon-wrap.locked-ico{background:linear-gradient(135deg,#64748b,#475569)}
.card-icon-wrap svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.card-title{font-size:.88rem;font-weight:600;color:#1e293b;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;width:100%;max-height:2.8em}
.card-count{margin-top:auto;margin-bottom:2px;background:#f1f5f9;padding:3px 10px;border-radius:100px;font-size:.7rem;color:#64748b;font-weight:600}
.card-sel-icon{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;border:2px solid #10b981;background:#fff;display:none;align-items:center;justify-content:center}
.card-sel-icon svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.note-card.selected .card-sel-icon{background:#10b981;display:flex}
.sort-handle{position:absolute;bottom:7px;right:7px;padding:5px;cursor:grab;opacity:.3;transition:opacity .2s}
.sort-handle svg{width:16px;height:16px;stroke:#64748b;fill:none;stroke-width:2;stroke-linecap:round}

/* ── EMPTY ── */
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:#94a3b8}
.empty-state svg{width:56px;height:56px;stroke:#cbd5e1;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-bottom:14px}
.empty-text{font-size:.95rem;font-weight:500}

/* ── FAB ── */
.fab{position:fixed;bottom:28px;left:24px;width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;box-shadow:0 8px 24px rgba(79,70,229,.45);cursor:pointer;z-index:1000;display:flex;align-items:center;justify-content:center;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.fab:active{transform:scale(.9)}
.fab svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.paste-fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#059669,#047857);color:#fff;padding:14px 26px;border-radius:100px;border:none;font-family:'IBM Plex Sans Arabic';font-weight:700;font-size:.95rem;box-shadow:0 8px 24px rgba(5,150,105,.4);display:none;z-index:2000;align-items:center;gap:8px;cursor:pointer}
.paste-fab svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── CONTEXT MENU OVERLAY ── */
#ctxOverlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:4999;display:none;background:rgba(0,0,0,.35);backdrop-filter:blur(2px)}

/* ── MENUS ── */
.menu-sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:28px 28px 0 0;z-index:5000;display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(0,0,0,.18);padding:8px 0 24px;transform:translateY(110%);transition:transform .35s cubic-bezier(.32,0,.67,0);pointer-events:none}
.menu-sheet.open{transform:translateY(0);transition:transform .38s cubic-bezier(.34,1.15,.64,1);pointer-events:all}
.menu-handle{width:40px;height:4px;background:#e2e8f0;border-radius:100px;margin:10px auto 14px}
.menu-title{font-size:.8rem;font-weight:700;color:#94a3b8;letter-spacing:.08em;padding:0 20px 8px;text-transform:uppercase}

.menu-item{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;border:none;background:none;width:100%;font-family:'IBM Plex Sans Arabic';font-size:1rem;font-weight:500;color:#1e293b;text-align:right;transition:background .15s;position:relative}
.menu-item:active{background:#f8fafc}
.menu-item .m-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-item .m-icon svg{width:20px;height:20px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.menu-item .m-label{flex:1;text-align:right}
.menu-item .m-arrow{color:#d1d5db}
.menu-item .m-arrow svg{width:16px;height:16px;stroke:#d1d5db;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.menu-sep{height:1px;background:#f1f5f9;margin:4px 20px}
.menu-item.red .m-label{color:#ef4444}
.menu-item.red .m-icon{background:rgba(239,68,68,.1)}
.menu-item.red .m-icon svg{stroke:#ef4444}
.menu-item.blue .m-icon{background:rgba(79,70,229,.1)}
.menu-item.blue .m-icon svg{stroke:#4f46e5}
.menu-item.green .m-icon{background:rgba(16,185,129,.1)}
.menu-item.green .m-icon svg{stroke:#10b981}
.menu-item.amber .m-icon{background:rgba(245,158,11,.1)}
.menu-item.amber .m-icon svg{stroke:#f59e0b}
.menu-item.violet .m-icon{background:rgba(139,92,246,.1)}
.menu-item.violet .m-icon svg{stroke:#8b5cf6}
.menu-item.slate .m-icon{background:rgba(100,116,139,.1)}
.menu-item.slate .m-icon svg{stroke:#64748b}

#createMenu{position:fixed;bottom:96px;left:16px;right:auto;width:200px;background:#fff;border-radius:20px;z-index:5000;display:none;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:6px 0;transform-origin:bottom left}
#createMenu.open{display:flex;animation:popUp .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes popUp{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.create-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border:none;background:none;width:100%;font-family:'IBM Plex Sans Arabic';font-size:.9rem;font-weight:600;color:#1e293b;text-align:right;transition:background .15s}
.create-item:active{background:#f8fafc}
.create-item .ci-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.create-item .ci-icon svg{width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── MODALS ── */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:6000;justify-content:center;align-items:center;backdrop-filter:blur(6px)}
.modal-full{position:fixed;top:0;left:0;width:100%;height:100%;z-index:6000;background:#f8fafc;flex-direction:column;display:none}
.modal-card{background:#fff;width:92%;max-width:340px;border-radius:28px;padding:28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:cardPop .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardPop{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-msg{font-size:1.05rem;font-weight:600;margin-bottom:20px;line-height:1.6;color:#1e293b;text-align:center}
.modal-actions{display:flex;gap:10px;margin-top:10px}

/* ── BUTTON STYLES ── */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;border:none;padding:13px 18px;border-radius:14px;cursor:pointer;font-family:'IBM Plex Sans Arabic';font-weight:700;font-size:.95rem;flex:1;transition:all .15s}
.btn:active{transform:scale(.96)}
.btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;box-shadow:0 4px 14px rgba(79,70,229,.35)}
.btn-danger{background:rgba(239,68,68,.1);color:#ef4444;border:1.5px solid rgba(239,68,68,.25)}
.btn-ghost{background:#f1f5f9;color:#64748b}
.btn-success{background:rgba(16,185,129,.1);color:#059669;border:1.5px solid rgba(16,185,129,.25)}
.btn-copy{background:rgba(139,92,246,.1);color:#7c3aed;border:1.5px solid rgba(139,92,246,.25)}

/* ── INPUT STYLES ── */
.inp{width:100%;padding:14px 16px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;font-family:'IBM Plex Sans Arabic';font-size:1rem;color:#1e293b;text-align:right;margin-bottom:18px;transition:border-color .2s}
.inp:focus{border-color:#4f46e5;background:#fff}
.inp::placeholder{color:#94a3b8}
.inp-area{width:100%;flex-grow:1;padding:16px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;font-family:'IBM Plex Sans Arabic';font-size:1rem;color:#1e293b;text-align:right;margin-bottom:14px;resize:none;overflow-y:auto;white-space:pre-wrap;line-height:1.7;transition:border-color .2s}
.inp-area:focus{border-color:#4f46e5;background:#fff}
.inp-pass{text-align:center;letter-spacing:.2em;font-size:1.1rem}

/* ── EDIT FULLSCREEN ── */
#editModal{background:#fff}
.edit-topbar{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1.5px solid #f1f5f9}
.edit-topbar .btn{flex:0;padding:10px 14px;font-size:.85rem}
.edit-search-bar{display:none;align-items:center;gap:8px;padding:10px 16px;background:#f8fafc;border-bottom:1.5px solid #e2e8f0}
.es-inp{flex:1;border:1.5px solid #e2e8f0;background:#fff;padding:8px 12px;border-radius:10px;font-family:'IBM Plex Sans Arabic';text-align:right;font-size:.9rem;color:#1e293b}
.es-btn{width:34px;height:34px;border:1.5px solid #e2e8f0;background:#fff;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.es-btn svg{width:16px;height:16px;stroke:#4f46e5;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── DETAILS MODAL ── */
#detailsModal{background:#f8fafc}
.details-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border-bottom:1.5px solid #f1f5f9;gap:8px}
.note-title-label{font-size:1.25rem;font-weight:700;color:#4f46e5;padding:12px 16px 0}
.sub-notes-list{flex:1;overflow-y:auto;list-style:none;padding:10px 16px}
.sub-note-item{display:flex;align-items:flex-start;gap:12px;background:#fff;padding:13px 14px;margin-bottom:9px;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);border-right:3px solid #7c3aed;cursor:pointer;transition:all .2s}
.sub-note-item:active{background:#f5f3ff}
.sub-note-item.selected{border-right-color:#10b981;background:#f0fdf4}
.sub-note-content{flex:1;font-size:.95rem;line-height:1.55;color:#334155;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;white-space:pre-wrap}
.input-area{display:flex;gap:10px;padding:12px 16px;background:#fff;border-top:1.5px solid #f1f5f9}
#newSubNoteInput{flex:1;height:48px;padding:10px 14px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;font-family:'IBM Plex Sans Arabic';font-size:.95rem;color:#1e293b;text-align:right;transition:border-color .2s}
#newSubNoteInput:focus{border-color:#4f46e5;background:#fff}
.add-btn{width:48px;height:48px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(79,70,229,.35);flex-shrink:0}
.add-btn:active{transform:scale(.93)}
.add-btn svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.sub-search-wrap{padding:10px 16px;background:#fff;border-bottom:1px solid #f1f5f9}
#subSearchInput{width:100%;padding:10px 14px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;font-family:'IBM Plex Sans Arabic';font-size:.88rem;color:#1e293b;text-align:right;transition:border-color .2s}
#subSearchInput:focus{border-color:#4f46e5}

/* ── NOTIFICATION ── */
#notifToast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:12px 20px;border-radius:100px;font-size:.9rem;font-weight:600;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
#notifToast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#notifToast svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── DRAG ACTION SHEET ── */
.drag-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:4px 20px 8px}
.drag-card{background:#f8fafc;border:2px solid #e2e8f0;border-radius:18px;padding:18px 10px;text-align:center;cursor:pointer;transition:all .2s}
.drag-card:active{transform:scale(.95)}
.drag-card.move-c{border-color:rgba(79,70,229,.3);background:#f0f0ff}
.drag-card.swap-c{border-color:rgba(245,158,11,.3);background:#fffbeb}
.drag-card .dc-icon{font-size:1.8rem;margin-bottom:6px}
.drag-card .dc-title{font-weight:700;font-size:.9rem;color:#1e293b;margin-bottom:2px}
.drag-card .dc-desc{font-size:.75rem;color:#64748b}

/* ── GOOGLE LOGIN OVERLAY ── */
#loginOverlay {position:fixed; top:0; left:0; right:0; bottom:0; background-color:#f0f2f5; z-index:7000; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px;}
.login-card {background:white; padding:40px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.1); text-align:center; width:100%; max-width:340px; font-family:'IBM Plex Sans Arabic', sans-serif;}
.google-btn {display:flex; align-items:center; justify-content:center; background-color:#1a73e8; color:white; border:none; padding:4px; border-radius:8px; font-size:1rem; font-weight:600; font-family:'IBM Plex Sans Arabic'; cursor:pointer; width:100%; transition:background-color 0.3s; text-decoration:none; margin-top:20px;}
.google-btn:hover {background-color:#1765cc;}
.google-icon-wrapper {background:white; padding:8px; border-radius:6px; display:flex; align-items:center; justify-content:center;}
.google-icon {width:20px; height:20px;}
.user-profile-img {width:24px; height:24px; border-radius:50%; object-fit:cover; border:1px solid #ddd;}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="font-size:1.4rem; font-weight:700; margin-bottom:10px; color:#1e293b;">تسجيل الدخول مطلوب</h2>

<script>
// ─── DATA & CONSTANTS ──────────────────────────────────────────
const APP_PASS_KEY = 'smartNotes_appPass';
const LOCAL_DATA_KEY = 'smartNotes_localData'; 
const GOOGLE_CLIENT_ID = '979816526016-ukb9vqtb6u2hlutombpf8rumbjr3o2ua.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/userinfo.profile';
const FILENAME = 'smart_notes_cloud_v1.json'; 

let allData = [];
let currentFolderId = null;
let searchMatches = [], currentSearchIndex = -1;
let historyStack = [], historyIndex = -1, originalContent = '';
let itemsClipboard = [], isPasteMode = false, clipboardAction = 'move';
let activeCardId = null, currentNoteId = null, activeSubNoteIndex = null;
let isMainSelectionMode = false, selectedMainIds = new Set();
let isSelectionMode = false, selectedSubIndices = new Set();
let activeEditResolve = null;

let tokenClient;
let gAccessToken = localStorage.getItem('gAccessToken'); 
let saveTimeout = null; 
let isRetry = false; 

// ─── INIT ────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('searchInput').value = '';
  loadData(); 
  document.getElementById('searchInput').addEventListener('focus', pushState);
  document.getElementById('editTextArea').addEventListener('input', function() { saveHistory(this.value); });
  document.getElementById('editSaveBtn').onclick = () => { const v = document.getElementById('editTextArea').value; hideEditModal(true, v); };
  document.addEventListener('click', e => {
    const cm = document.getElementById('createMenu');
    if(cm.classList.contains('open') && !e.target.closest('#createMenu') && !e.target.closest('.fab'))
      { cm.classList.remove('open'); cm.style.display = 'none'; }
  });
});

// ─── STORAGE (HYBRID RAM+CLOUD) ──────────────────────────────────
function saveData() { 
    localStorage.setItem(LOCAL_DATA_KEY, JSON.stringify(allData));
    
    if(saveTimeout) clearTimeout(saveTimeout);
    document.getElementById('syncText').innerText = "جاري الحفظ...";
    setSyncLoader(true);
    saveTimeout = setTimeout(() => { forceUploadToDrive(true); }, 1000);
} 

function loadData() { 
    const cachedData = localStorage.getItem(LOCAL_DATA_KEY);
    if (cachedData) {
        try { allData = JSON.parse(cachedData); renderMainGrid(); } 
        catch (e) { console.error(e); }
    }

    if(gAccessToken) {
        forceSyncFromCloud(true);
    } else {
        if (!cachedData || allData.length === 0) {
             document.getElementById('loginOverlay').style.display = 'flex';
        }
    }
}

// ─── HISTORY API ─────────────────────────────────────────────────
window.addEventListener('popstate', () => {
  const openSheet = ['ctxSheet', 'subCtxSheet', 'dragSheet', 'settingsSheet'].find(id => { const el = document.getElementById(id); return el && el.classList.contains('open'); });
  if(openSheet) { closeSheet(openSheet); return; }
  if(document.getElementById('editModal').style.display === 'flex') { handleEditBack(); return; }
  if(document.getElementById('inputModal').style.display === 'flex') { closeInputModal(); return; }
  if(document.getElementById('detailsModal').style.display === 'flex') { closeDetailsModal(); return; }
  if(document.getElementById('saveConfirmModal').style.display === 'flex') { resolveSaveConfirm(false); return; }
  if(document.getElementById('loginOverlay').style.display === 'flex') { return; }
  if(document.getElementById('searchInput').value) { clearSearch(); return; }
  if(currentFolderId !== null) { const pid = getParentFolderId(allData, currentFolderId); currentFolderId = (pid === undefined) ? null : pid; renderMainGrid(); return; }
});
function pushState() { window.history.pushState({open: true}, ''); }

// ─── HELPERS ─────────────────────────────────────────────────────
function findNoteById(list, id) { id = parseFloat(id); for(let it of list){ if(parseFloat(it.id) === id) return it; if(it.type === 'folder' && it.items){ const f = findNoteById(it.items, id); if(f) return f; } } return null; }
function getCurrentList() { if(currentFolderId === null) return allData; const f = findNoteById(allData, currentFolderId); return f ? (f.items || []) : []; }
function getParentFolderId(list, targetId, parentId = null) { for(let it of list){ if(parseFloat(it.id) === parseFloat(targetId)) return parentId; if(it.type === 'folder' && it.items){ const f = getParentFolderId(it.items, targetId, it.id); if(f !== undefined) return f; } } return undefined; }
function removeItemFromTree(list, id) { for(let i = 0; i < list.length; i++){ if(parseFloat(list[i].id) === parseFloat(id)){ list.splice(i, 1); return true; } if(list[i].type === 'folder' && list[i].items && removeItemFromTree(list[i].items, id)) return true; } return false; }

// ─── RENDER GRID ─────────────────────────────────────────────────
function renderMainGrid(filter = '') {
  const grid = document.getElementById('notesGrid'); grid.innerHTML = '';
  const nav = document.getElementById('navBar');
  if(currentFolderId === null) { nav.style.display = 'none'; }
  else { nav.style.display = 'flex'; const f = findNoteById(allData, currentFolderId); document.getElementById('currentPathTitle').textContent = f ? `📁 ${f.title}` : ''; }
  
  const pb = document.getElementById('pasteFloatingBtn'), fab = document.getElementById('mainFab');
  if(isPasteMode) { pb.style.display = 'flex'; fab.style.display = 'none'; pb.childNodes[2].textContent = clipboardAction === 'move' ? ' لصق هنا (نقل)' : ' لصق هنا (نسخ)'; }
  else { pb.style.display = 'none'; fab.style.display = 'flex'; }
  
  const list = getCurrentList();
  const filtered = list.filter(n => n.title.toLowerCase().includes(filter.toLowerCase()));
  if(!filtered.length) { grid.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p class="empty-text">لا توجد عناصر هنا بعد</p></div>`; return; }
  
  filtered.forEach(item => {
    const card = document.createElement('div');
    card.className = `note-card ${item.type === 'folder' ? 'is-folder' : 'is-note'}`;
    card.dataset.id = item.id; card.dataset.type = item.type; card.draggable = true;
    if(selectedMainIds.has(item.id)) card.classList.add('selected');
    
    let iconHtml = '', iconClass = 'note-ico';
    if(item.isLocked) { iconClass = 'locked-ico'; iconHtml = `<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`; }
    else if(item.type === 'folder') { iconClass = 'folder-ico'; iconHtml = `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`; }
    else if(item.type === 'note') { iconClass = 'note-ico'; iconHtml = `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`; }
    else { iconClass = 'locked-ico'; iconHtml = `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`; }
    
    let countLabel = `<div class="card-count">${item.items ? item.items.length : 0} ${item.type === 'folder' ? 'عنصر' : 'ملاحظة'}</div>`;
    if(item.type === 'file') countLabel = `<div class="card-count">ملف قديم</div>`;
    
    const selCheckSvg = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    
    card.innerHTML = `
      <div class="card-sel-icon">${selCheckSvg}</div>
      <div class="card-icon-wrap ${iconClass}">${iconHtml}</div>
      <div class="card-title">${item.title}</div>
      ${countLabel}
      ${!isMainSelectionMode ? `<div class="sort-handle"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>` : ''}
    `;
    
    let pressTimer = null, touchMoved = false, touchStartX = 0, touchStartY = 0, isLongPress = false;
    card.addEventListener('touchstart', e => {
      if(e.target.closest('.sort-handle')) return;
      touchMoved = false; isLongPress = false;
      touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
      pressTimer = setTimeout(() => {
        if(!touchMoved) {
          isLongPress = true;
          if(navigator.vibrate) navigator.vibrate(40);
          if(isMainSelectionMode) { toggleMainSelection(item.id); } else { showCtxSheet(item.id); }
        }
      }, 500);
    }, {passive: true});
    card.addEventListener('touchmove', e => {
      const dx = Math.abs(e.touches[0].clientX - touchStartX); const dy = Math.abs(e.touches[0].clientY - touchStartY);
      if(dx > 8 || dy > 8) { touchMoved = true; clearTimeout(pressTimer); }
    }, {passive: true});
    card.addEventListener('touchend', e => {
      clearTimeout(pressTimer);
      if(isLongPress) { e.preventDefault(); return; }
      if(!touchMoved) { if(isMainSelectionMode) { e.preventDefault(); toggleMainSelection(item.id); } else { handleCardClick(e, item); } }
    }, {passive: false});
    card.addEventListener('click', e => { if(!('ontouchstart' in window)) { handleCardClick(e, item); } });
    card.oncontextmenu = e => { e.preventDefault(); if(!touchMoved && !isLongPress) { showCtxSheet(item.id); } };
    
    addDragEvents(card, item);
    grid.appendChild(card);
  });
  
  document.getElementById('clearSearchBtn').style.display = filter ? 'flex' : 'none';
}

function searchNotes() { renderMainGrid(document.getElementById('searchInput').value); }
function clearSearch() { document.getElementById('searchInput').value = ''; renderMainGrid(); }

// ─── CARD CLICK ───────────────────────────────────────────────────
function handleCardClick(e, item) {
  if(isMainSelectionMode) { toggleMainSelection(item.id); return; }
  if(e.target.closest('.sort-handle')) return;
  if(item.type === 'folder') { if(item.isLocked) { checkPassword(item, () => { currentFolderId = item.id; pushState(); renderMainGrid(); }); } else { currentFolderId = item.id; pushState(); renderMainGrid(); } }
  else if(item.type === 'file') { showNotif('الملفات القديمة غير مدعومة. للتحميل اضغط مطولاً.', 'info'); }
  else { if(item.isLocked) { checkPassword(item, () => openNoteDetails(item.id)); } else openNoteDetails(item.id); }
}

// ─── NOTE DETAILS ─────────────────────────────────────────────────
function openNoteDetails(id) { currentNoteId = id; pushState(); const n = findNoteById(allData, id); if(!n) return; document.getElementById('modalTitle').textContent = n.title; document.getElementById('detailsModal').style.display = 'flex'; renderSubNotes(); }
function closeDetailsModal() { document.getElementById('detailsModal').style.display = 'none'; document.getElementById('subSearchInput').value = ''; toggleSelectionMode(false); }
function renderSubNotes() {
  const el = document.getElementById('subNotesList'); el.innerHTML = '';
  const n = findNoteById(allData, currentNoteId); if(!n) return;
  const filter = document.getElementById('subSearchInput').value.toLowerCase();
  (n.items || []).forEach((content, i) => {
    if(filter && !content.toLowerCase().includes(filter)) return;
    const li = document.createElement('li'); li.className = 'sub-note-item';
    if(isSelectionMode && selectedSubIndices.has(i)) li.classList.add('selected');
    li.innerHTML = `<div class="sub-note-content">${content.length > 200 ? content.substring(0, 200) + '...' : content}</div>`;
    let pt = null, tm = false, tsx = 0, tsy = 0, isLP = false;
    li.addEventListener('touchstart', e => { tm = false; isLP = false; tsx = e.touches[0].clientX; tsy = e.touches[0].clientY; pt = setTimeout(() => { if(!tm) { isLP = true; if(navigator.vibrate) navigator.vibrate(40); showSubCtxSheet(i); } }, 500); }, {passive: true});
    li.addEventListener('touchmove', e => { if(Math.abs(e.touches[0].clientX - tsx) > 8 || Math.abs(e.touches[0].clientY - tsy) > 8) { tm = true; clearTimeout(pt); } }, {passive: true});
    li.addEventListener('touchend', e => { clearTimeout(pt); if(isLP) { e.preventDefault(); return; } if(!tm) { if(isSelectionMode) toggleSubSelection(i); else editSubNote(i); } });
    li.onclick = () => { if(!('ontouchstart' in window)) { if(isSelectionMode) toggleSubSelection(i); else editSubNote(i); } };
    li.oncontextmenu = e => { e.preventDefault(); if(!tm && !isLP) showSubCtxSheet(i); };
    el.appendChild(li);
  });
}
function addSubNote() { const inp = document.getElementById('newSubNoteInput'); if(!inp.value.trim()) return; const n = findNoteById(allData, currentNoteId); if(!n.items) n.items = []; n.items.unshift(inp.value.trim()); inp.value = ''; saveData(); renderSubNotes(); }
async function editSubNote(i) { const n = findNoteById(allData, currentNoteId); const v = await showEditModal(n.items[i]); if(v !== null) { n.items[i] = v; saveData(); renderSubNotes(); } }
function toggleSelectionMode(a) { isSelectionMode = a; selectedSubIndices.clear(); document.getElementById('selectBtn').style.display = a ? 'none' : 'flex'; ['selectAllBtn', 'cancelSelectionBtn', 'deleteSubBtn'].forEach(id => document.getElementById(id).style.display = a ? 'flex' : 'none'); renderSubNotes(); }
function toggleSubSelection(i) { selectedSubIndices.has(i) ? selectedSubIndices.delete(i) : selectedSubIndices.add(i); renderSubNotes(); }
function selectAllSubNotes() { const n = findNoteById(allData, currentNoteId); if(n && n.items) n.items.forEach((_, i) => selectedSubIndices.add(i)); renderSubNotes(); }
async function deleteSelectedSubNotesWrapper() { if(!selectedSubIndices.size) return; if(!await verifyAppPass()) return; if(await showConfirm('حذف العناصر المحددة؟')) { const n = findNoteById(allData, currentNoteId); Array.from(selectedSubIndices).sort((a,b) => b-a).forEach(i => n.items.splice(i, 1)); saveData(); toggleSelectionMode(false); } }

// ─── EDIT MODAL ───────────────────────────────────────────────────
function showEditModal(initialValue = '') {
  pushState();
  document.getElementById('editModal').style.display = 'flex';
  document.getElementById('editTextArea').value = initialValue;
  originalContent = initialValue;
  initHistory(initialValue);
  return new Promise(resolve => { activeEditResolve = resolve; });
}
function hideEditModal(saved, val = null) { document.getElementById('editModal').style.display = 'none'; document.getElementById('editSearchBar').style.display = 'none'; if(activeEditResolve) { activeEditResolve(saved ? val : null); activeEditResolve = null; } if(window.history.state?.open) window.history.back(); }
function handleEditBack() { const v = document.getElementById('editTextArea').value; if(v !== originalContent) { document.getElementById('saveConfirmModal').style.display = 'flex'; } else hideEditModal(false); }
function resolveSaveConfirm(s) { document.getElementById('saveConfirmModal').style.display = 'none'; if(s) hideEditModal(true, document.getElementById('editTextArea').value); else hideEditModal(false); }
function toggleEditSearch() { const bar = document.getElementById('editSearchBar'); const open = bar.style.display === 'flex'; bar.style.display = open ? 'none' : 'flex'; if(!open) { document.getElementById('inTextSearchInput').focus(); searchMatches = []; currentSearchIndex = -1; } }
function initHistory(v) { historyStack = [v]; historyIndex = 0; updUR(); }
function saveHistory(v) { if(historyIndex < historyStack.length - 1) historyStack = historyStack.slice(0, historyIndex + 1); historyStack.push(v); historyIndex++; updUR(); }
function undo() { if(historyIndex > 0) { historyIndex--; document.getElementById('editTextArea').value = historyStack[historyIndex]; updUR(); } }
function redo() { if(historyIndex < historyStack.length - 1) { historyIndex++; document.getElementById('editTextArea').value = historyStack[historyIndex]; updUR(); } }
function updUR() { document.getElementById('btnUndo').style.opacity = historyIndex > 0 ? '1' : '.3'; document.getElementById('btnRedo').style.opacity = historyIndex < historyStack.length - 1 ? '1' : '.3'; }
function findInText(dir) {
  const ta = document.getElementById('editTextArea'); const term = document.getElementById('inTextSearchInput').value; if(!term) return;
  if(!searchMatches.length || ta.value.indexOf(term, searchMatches[0]) !== searchMatches[0]) { searchMatches = []; let p = ta.value.indexOf(term); while(p > -1) { searchMatches.push(p); p = ta.value.indexOf(term, p + 1); } if(!searchMatches.length) { showNotif('لم يتم العثور', 'info'); return; } currentSearchIndex = -1; }
  if(dir === 'next') { currentSearchIndex = (currentSearchIndex + 1) % searchMatches.length; } else { currentSearchIndex = (currentSearchIndex - 1 + searchMatches.length) % searchMatches.length; }
  const mp = searchMatches[currentSearchIndex]; ta.focus(); ta.setSelectionRange(mp, mp + term.length); ta.scrollTop = (ta.value.substring(0, mp).split('\n').length - 2) * 24;
}

// ─── INPUT MODAL ──────────────────────────────────────────────────
function showInputModal(msg, initVal = '', type = 'single', allowCopy = false, allowPaste = false) {
  pushState();
  document.getElementById('inputMessage').textContent = msg;
  const si = document.getElementById('modalInputSingle'), ai = document.getElementById('modalInputArea');
  si.style.display = type === 'single' ? 'block' : 'none'; ai.style.display = type === 'area' ? 'block' : 'none';
  document.getElementById('inputCopyBtn').style.display = allowCopy ? 'flex' : 'none';
  document.getElementById('inputPasteBtn').style.display = allowPaste ? 'flex' : 'none';
  const active = type === 'single' ? si : ai; active.value = initVal;
  document.getElementById('inputModal').style.display = 'flex';
  setTimeout(() => active.focus(), 300);
  return new Promise(resolve => {
    document.getElementById('inputBtn').onclick = () => { closeInputModal(resolve, active.value); };
    window.copyModalContent = () => { navigator.clipboard.writeText(active.value); showNotif('تم النسخ', 'success'); };
    window.pasteModalContent = async () => { try { active.value = await navigator.clipboard.readText(); } catch(e) { showNotif('تعذر الوصول للحافظة', 'error'); } };
    window._inputResolve = resolve;
  });
}
function closeInputModal(resolve = null, val = null) {
  document.getElementById('inputModal').style.display = 'none';
  const res = resolve || window._inputResolve;
  if(res) res(val);
  window._inputResolve = null;
  if(window.history.state?.open) window.history.back();
}

// ─── CONFIRM / PASSWORD ───────────────────────────────────────────
function showConfirm(msg) { document.getElementById('confirmMessage').textContent = msg; document.getElementById('confirmModal').style.display = 'flex'; return new Promise(r => { window.hideConfirmModal = res => { document.getElementById('confirmModal').style.display = 'none'; r(res); }; }); }
function showPasswordModal() { document.getElementById('modalPasswordInput').value = ''; document.getElementById('passwordModal').style.display = 'flex'; setTimeout(() => document.getElementById('modalPasswordInput').focus(), 200); return new Promise(r => { document.getElementById('passwordBtn').onclick = () => { const v = document.getElementById('modalPasswordInput').value; document.getElementById('passwordModal').style.display = 'none'; r(v); }; window.hidePasswordModal = v => { document.getElementById('passwordModal').style.display = 'none'; r(v); }; }); }
async function checkPassword(item, cb) { const p = await showPasswordModal(); if(!p) return false; if(btoa(p) === item.passwordHash) { if(cb) cb(); return true; } else { showNotif('كلمة المرور خاطئة', 'error'); return false; } }
async function verifyAppPass() { const sp = localStorage.getItem(APP_PASS_KEY); if(!sp) return true; const p = await showPasswordModal(); if(p && btoa(p) === sp) return true; showNotif('كلمة مرور خاطئة', 'error'); return false; }

// ─── CTX SHEET ────────────────────────────────────────────────────
function showCtxSheet(id) {
  const isMulti = isMainSelectionMode && selectedMainIds.size > 0;
  let item = null;
  
  if(isMulti) {
    const sel = getCurrentList().filter(n => selectedMainIds.has(n.id));
    const allLocked = sel.every(n => n.isLocked);
    document.getElementById('ctxLockLabel').textContent = allLocked ? 'فتح قفل المحدد' : 'قفل المحدد';
    document.getElementById('ctxEditBtn').style.display = 'none';
  } else {
    activeCardId = id;
    item = findNoteById(allData, id);
    if(!item) return;
    document.getElementById('ctxLockLabel').textContent = item.isLocked ? 'فتح القفل' : 'قفل';
    document.getElementById('ctxEditBtn').style.display = 'flex';
  }

  document.getElementById('ctxLockBtn').style.display = 'flex';
  document.getElementById('ctxHomeBtn').style.display = currentFolderId !== null ? 'flex' : 'none';
  openSheet('ctxSheet');
}
function showSubCtxSheet(i) { activeSubNoteIndex = i; openSheet('subCtxSheet'); }

// ─── CTX ACTIONS ─────────────────────────────────────────────────
async function handleMenuAction(action) {
  closeSheet('ctxSheet'); 
  const isMulti = isMainSelectionMode && selectedMainIds.size > 0;
  let item = null;
  
  if(!isMulti) {
    item = findNoteById(allData, activeCardId);
    if(!item) return;
  }
  
  if(action === 'delete') {
    if(isMulti) { deleteSelectedMainNotesWrapper(); return; }
    if(!await verifyAppPass()) return;
    if(item.isLocked) { const p = await showPasswordModal(); if(!p || btoa(p) !== item.passwordHash) { showNotif('كلمة المرور خاطئة', 'error'); return; } }
    if(await showConfirm(`حذف "${item.title}"؟`)) { removeItemFromTree(allData, activeCardId); saveData(); renderMainGrid(); }
  }
  else if(action === 'edit') {
    if(item.isLocked && !await checkPassword(item)) return;
    const t = await showInputModal(item.type === 'folder' ? 'اسم المجلد:' : 'عنوان الملاحظة:', item.title, 'single');
    if(t) { item.title = t; saveData(); renderMainGrid(); }
  }
  else if(action === 'toggleLock') {
    if(isMulti) {
      const sel = getCurrentList().filter(n => selectedMainIds.has(n.id));
      const allLocked = sel.every(n => n.isLocked);
      if(allLocked) {
        const p = await showPasswordModal();
        if(p) {
          let c = 0;
          sel.forEach(it => { if(it.passwordHash === btoa(p)) { it.isLocked = false; it.passwordHash = null; c++; } });
          showNotif(c > 0 ? `تم فتح ${c} عنصر` : 'كلمة المرور خاطئة', c > 0 ? 'success' : 'error');
        }
      } else {
        const p = await showPasswordModal();
        if(p) {
          sel.forEach(it => { it.isLocked = true; it.passwordHash = btoa(p); });
          showNotif('تم القفل بنجاح', 'success');
        }
      }
      toggleMainSelectionMode(false);
    } else {
      if(item.isLocked) { if(await checkPassword(item)) { item.isLocked = false; item.passwordHash = null; showNotif('تم فتح القفل', 'success'); } }
      else { const p = await showPasswordModal(); if(p) { item.isLocked = true; item.passwordHash = btoa(p); showNotif('تم القفل', 'success'); } }
    }
    saveData(); renderMainGrid();
  }
  else if(action === 'move' || action === 'copy') {
    if(!await verifyAppPass()) return;
    const list = getCurrentList();
    itemsClipboard = isMulti ? list.filter(n => selectedMainIds.has(n.id)) : [item];
    clipboardAction = action; isPasteMode = true;
    toggleMainSelectionMode(false); renderMainGrid();
    showNotif(action === 'move' ? 'تم القص — انتقل للوجهة واضغط لصق' : 'تم النسخ — انتقل للوجهة واضغط لصق', 'info');
  }
  else if(action === 'moveToRoot') {
    if(currentFolderId === null) return; if(!await verifyAppPass()) return;
    const list = getCurrentList(); const items = isMulti ? list.filter(n => selectedMainIds.has(n.id)) : [item];
    if(await showConfirm('إضافة العناصر للواجهة الرئيسية؟')) {
      const folder = findNoteById(allData, currentFolderId);
      items.forEach(it => { folder.items = folder.items.filter(n => n.id !== it.id); allData.unshift(it); });
      saveData(); toggleMainSelectionMode(false); renderMainGrid(); showNotif('تمت الإضافة', 'success');
    }
  }
}

async function handleSubNoteAction(action) {
  closeSheet('subCtxSheet');
  const n = findNoteById(allData, currentNoteId);
  if(action === 'delete') { if(!await verifyAppPass()) return; n.items.splice(activeSubNoteIndex, 1); saveData(); renderSubNotes(); }
  else if(action === 'copy') { navigator.clipboard.writeText(n.items[activeSubNoteIndex]); showNotif('تم النسخ', 'success'); }
  else if(action === 'edit') { editSubNote(activeSubNoteIndex); }
}

// ─── PASTE ────────────────────────────────────────────────────────
async function pasteItemsHere() {
  if(!isPasteMode || !itemsClipboard.length) return;
  if(clipboardAction === 'move') { itemsClipboard.forEach(c => removeItemFromTree(allData, c.id)); getCurrentList().unshift(...itemsClipboard); }
  else { itemsClipboard.forEach(it => { const copy = JSON.parse(JSON.stringify(it)); copy.id = Date.now() + Math.random(); copy.title += ' (نسخة)'; getCurrentList().unshift(copy); }); }
  saveData(); itemsClipboard = []; isPasteMode = false; renderMainGrid(); showNotif('تم اللصق ✅', 'success');
}

  isMainSelectionMode = active; if(!active) selectedMainIds.clear();

function toggleMainSelection(id) { selectedMainIds.has(id) ? selectedMainIds.delete(id) : selectedMainIds.add(id); renderMainGrid(); }
function handleSelectionAction(action) {
  const list = getCurrentList();

async function deleteSelectedMainNotesWrapper() {
  if(!selectedMainIds.size) return; if(!await verifyAppPass()) return;
  const list = getCurrentList(); const locked = list.filter(n => selectedMainIds.has(n.id) && n.isLocked);
  if(locked.length) { const p = await showPasswordModal(); if(!p || locked[0].passwordHash !== btoa(p)) { showNotif('كلمة المرور خاطئة', 'error'); return; } }
  if(await showConfirm(`حذف ${selectedMainIds.size} عناصر؟`)) { selectedMainIds.forEach(id => removeItemFromTree(allData, id)); saveData(); toggleMainSelectionMode(false); showNotif('تم الحذف', 'success'); }
}

// ─── DRAG & DROP ─────────────────────────────────────────────────
let dragSrcId = null, mobileDragEl = null, mobileDragClone = null, lastTargetEl = null;

function addDragEvents(card, item) {
  card.addEventListener('dragstart', e => { dragSrcId = parseFloat(card.dataset.id); card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', dragSrcId); });
  card.addEventListener('dragover', e => { e.preventDefault(); });
  card.addEventListener('dragenter', () => card.classList.add('drag-target'));
  card.addEventListener('dragleave', () => card.classList.remove('drag-target'));
  card.addEventListener('drop', async e => { e.stopPropagation(); document.querySelectorAll('.note-card').forEach(c => c.classList.remove('drag-target')); const tid = parseFloat(card.dataset.id); if(dragSrcId === tid) return; if(card.dataset.type === 'folder') { const a = await showDragSheet(); if(a === 'move') moveItemsToFolder(tid); else if(a === 'swap') reorderItems(dragSrcId, tid); } else reorderItems(dragSrcId, tid); });
  card.addEventListener('dragend', () => { card.classList.remove('dragging'); document.querySelectorAll('.note-card').forEach(c => c.classList.remove('drag-target')); });
  
  const handle = card.querySelector('.sort-handle');
  if(handle) {
    let tm = false, tsx = 0, tsy = 0;
    handle.addEventListener('touchstart', e => { e.stopPropagation(); tm = false; tsx = e.touches[0].clientX; tsy = e.touches[0].clientY; mobileDragEl = card; dragSrcId = parseFloat(card.dataset.id); mobileDragClone = card.cloneNode(true); mobileDragClone.className = 'note-card dragging-mobile'; document.body.appendChild(mobileDragClone); updateClonePos(tsx, tsy); card.style.opacity = '.3'; }, {passive: true});
    handle.addEventListener('touchmove', e => { if(!mobileDragClone) return; const t = e.touches[0]; updateClonePos(t.clientX, t.clientY); mobileDragClone.style.display = 'none'; let el = document.elementFromPoint(t.clientX, t.clientY); mobileDragClone.style.display = 'flex'; const tc = el?.closest('.note-card'); if(lastTargetEl && lastTargetEl !== tc) lastTargetEl.classList.remove('drag-target-hover'); if(tc && tc !== mobileDragEl) { tc.classList.add('drag-target-hover'); lastTargetEl = tc; } else lastTargetEl = null; }, {passive: true});
    handle.addEventListener('touchend', async () => { if(!mobileDragClone) return; mobileDragClone.remove(); mobileDragClone = null; if(mobileDragEl) mobileDragEl.style.opacity = '1'; if(lastTargetEl) { lastTargetEl.classList.remove('drag-target-hover'); const tid = parseFloat(lastTargetEl.dataset.id); if(lastTargetEl.dataset.type === 'folder') { const a = await showDragSheet(); if(a === 'move') moveItemsToFolder(tid); else if(a === 'swap') reorderItems(dragSrcId, tid); } else reorderItems(dragSrcId, tid); } mobileDragEl = null; lastTargetEl = null; }, {passive: true});
  }
}

function updateClonePos(x, y) { if(mobileDragClone) { mobileDragClone.style.left = (x - 77) + 'px'; mobileDragClone.style.top = (y - 77) + 'px'; } }

function showDragSheet() { openSheet('dragSheet'); return new Promise(r => { window.resolveDragAction = action => { closeSheet('dragSheet'); r(action); }; }); }
function moveItemsToFolder(tfid) { const list = getCurrentList(); const tf = findNoteById(allData, tfid); if(!tf || tf.type !== 'folder') return; const items = (selectedMainIds.has(dragSrcId) && selectedMainIds.size > 1) ? list.filter(n => selectedMainIds.has(n.id) && n.id !== tfid) : list.filter(n => parseFloat(n.id) === dragSrcId && n.id !== tfid); if(!items.length) return; items.forEach(it => removeItemFromTree(allData, it.id)); items.forEach(it => tf.items.unshift(it)); saveData(); if(selectedMainIds.has(dragSrcId)) toggleMainSelectionMode(false); else renderMainGrid(); }
function reorderItems(srcId, targetId) { const list = getCurrentList(); const si = list.findIndex(n => parseFloat(n.id) === srcId); const ti = list.findIndex(n => parseFloat(n.id) === targetId); if(si < 0 || ti < 0 || si === ti) return; const [m] = list.splice(si, 1); list.splice(ti, 0, m); saveData(); renderMainGrid(); }

async function createItemWrapper(type) { document.getElementById('createMenu').classList.remove('open'); document.getElementById('createMenu').style.display = 'none'; const title = await showInputModal(type === 'folder' ? 'اسم المجلد:' : 'عنوان الملاحظة:', '', 'single'); if(title) { const ni = { id: Date.now(), type, title, items: [], isLocked: false }; getCurrentList().unshift(ni); saveData(); renderMainGrid(); if(type === 'note') openNoteDetails(ni.id); } }

function updateSettingsUI() { const has = !!localStorage.getItem(APP_PASS_KEY); document.getElementById('setPassBtn').style.display = has ? 'none' : 'flex'; document.getElementById('removePassBtn').style.display = has ? 'flex' : 'none'; }
function setAppPassword() { closeSheet('settingsSheet'); setTimeout(async () => { const p = await showPasswordModal(); if(p) { localStorage.setItem(APP_PASS_KEY, btoa(p)); saveData(); showNotif('تم القفل بنجاح', 'success'); } }, 350); }
function removeAppPassword() { closeSheet('settingsSheet'); setTimeout(async () => { if(await showConfirm('حذف كلمة مرور التطبيق؟')) { localStorage.removeItem(APP_PASS_KEY); saveData(); showNotif('تم حذف كلمة المرور', 'info'); } }, 350); }
function deleteAllData() { closeSheet('settingsSheet'); setTimeout(async () => { if(!await showConfirm('حذف جميع البيانات نهائياً؟')) { return; } if(!await showConfirm('هل أنت متأكد تماماً؟ سيتم حذفها من السحابة أيضاً!')) { return; } allData = []; saveData(); renderMainGrid(); showNotif('تم حذف جميع البيانات', 'info'); }, 350); }

function downloadJSON() {

  downloadAnchorNode.setAttribute("href", dataStr);

function handleJSONImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let c = e.target.result.trim().replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"');
      allData = JSON.parse(c);
      saveData();
      renderMainGrid();
      showNotif('تم الاستيراد بنجاح', 'success');
    } catch (err) {
      showNotif('الملف غير صالح', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── GOOGLE DRIVE CLOUD LOGIC ─────────────────────────────────────
function initGoogleLib() {
    if(window.google) {
        tokenClient = google.accounts.oauth2.initTokenClient({ 
            client_id: GOOGLE_CLIENT_ID, 
            scope: SCOPES, 
            callback: (resp) => { 
                if (resp.access_token) { 
                    gAccessToken = resp.access_token; 
                    localStorage.setItem('gAccessToken', gAccessToken); 
                    document.getElementById('loginOverlay').style.display = 'none'; 
                    isRetry = false; 
                    showNotif("تم الاتصال بالسحابة بنجاح", "success"); 
                    fetchUserInfo(); 
                    checkGoogleLoginState(); 
                    forceSyncFromCloud(true); 
                } 
            } 
        });
        if(gAccessToken) { checkGoogleLoginState(); }
    }
}

function startGoogleLogin() { 
    if(tokenClient) {
        document.getElementById('loginStatus').style.display = 'block';
        tokenClient.requestAccessToken(); 
    }
}

function openLoginOverlay() { closeSheet('settingsSheet'); document.getElementById('loginOverlay').style.display = 'flex'; }

function checkGoogleLoginState() { 
    if(gAccessToken) { 
        document.getElementById('googleLoginBtnArea').style.display = 'none'; 
        document.getElementById('googleSyncActions').style.display = 'block'; 
    } else { 
        document.getElementById('googleLoginBtnArea').style.display = 'block'; 
        document.getElementById('googleSyncActions').style.display = 'none'; 
    } 
}

async function fetchUserInfo() { 
    if(!gAccessToken) return; 
    const localPic = localStorage.getItem('userPhoto'); 
    if(localPic) updateLogoutIcon(localPic); 
    try { 
        let res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { 'Authorization': `Bearer ${gAccessToken}` } }); 
        if(res.ok) { 
            let data = await res.json(); 
            if(data.picture) { 
                localStorage.setItem('userPhoto', data.picture); 
                updateLogoutIcon(data.picture); 
            } 
        }
    } catch(e) {} 
}

function updateLogoutIcon(url) { 
    const area = document.getElementById('googleLogoutIcon'); 
    if(area) area.innerHTML = `<img src="${url}" class="user-profile-img" alt="User">`; 
}

async function handleGoogleLogout() {
    closeSheet('settingsSheet');
    setTimeout(async () => {
        if(await showConfirm("هل تريد تسجيل الخروج من السحابة؟")) {
            localStorage.removeItem('gAccessToken'); 
            localStorage.removeItem('userPhoto'); 
            gAccessToken = null; 
            document.getElementById('googleLogoutIcon').innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`; 
            checkGoogleLoginState(); 
            window.location.reload();
        }
    }, 350);
}

function setSyncLoader(show) { document.getElementById('syncLoader').style.display = show ? 'inline-block' : 'none'; }

async function forceUploadToDrive(silent = false) {
    if(!gAccessToken) { if(!silent) showNotif("غير مسجل دخول بالسحابة", "error"); return; } 
    if(!silent) { closeSheet('settingsSheet'); showNotif("جاري الرفع للسحابة...", "info"); }
    setSyncLoader(true);
    document.getElementById('syncText').innerText = "حفظ...";
    
    try { 
        const q = `name = '${FILENAME}' and 'appDataFolder' in parents and trashed = false`; 
        const searchResp = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=appDataFolder`, { headers: { 'Authorization': `Bearer ${gAccessToken}` } }); 
        
        if(searchResp.status === 401) { 
            if(!isRetry && tokenClient) {
                isRetry = true; tokenClient.requestAccessToken({prompt: ''}); return; 
            } else {
                 if(!silent) showNotif("انتهت الجلسة، يرجى تسجيل الدخول", "error");
                 localStorage.removeItem('gAccessToken'); gAccessToken=null; 
                 document.getElementById('loginOverlay').style.display = 'flex'; return; 
            }
        } 

        const data = await searchResp.json(); let fileId = null; if(data.files && data.files.length > 0) fileId = data.files[0].id; 
        
        const payload = { smartNotesData: allData, appGlobalPass: localStorage.getItem(APP_PASS_KEY) }; 
        const fileBlob = new Blob([JSON.stringify(payload)], { type: 'application/json' }); 
        
        if(fileId) { await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, { method: 'PATCH', headers: { 'Authorization': `Bearer ${gAccessToken}`, 'Content-Type': 'application/json' }, body: fileBlob }); } 
        else { const metadata = { name: FILENAME, mimeType: 'application/json', parents: ['appDataFolder'] }; const form = new FormData(); form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' })); form.append('file', fileBlob); await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { 'Authorization': `Bearer ${gAccessToken}` }, body: form }); } 
        if(!silent) showNotif("تم الحفظ في السحابة", "success"); 
    } catch(e) { if(!silent) showNotif("فشل الرفع", "error"); } 
    
    setSyncLoader(false); document.getElementById('syncText').innerText = "";
}

async function forceSyncFromCloud(silent = false) {
    if(!gAccessToken) { if(!silent) showNotif("غير مسجل دخول", "error"); return; } 
    if(!silent) { closeSheet('settingsSheet'); showNotif("جاري الجلب...", "info"); }
    setSyncLoader(true);
    document.getElementById('syncText').innerText = "تحميل...";

    try { 
        const q = `name = '${FILENAME}' and 'appDataFolder' in parents and trashed = false`; 
        const searchResp = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=appDataFolder`, { headers: { 'Authorization': `Bearer ${gAccessToken}` } }); 
        
        if(searchResp.status === 401) { 
            if(!isRetry && tokenClient) {
                isRetry = true; try { tokenClient.requestAccessToken({prompt: ''}); } catch (e) { document.getElementById('loginOverlay').style.display = 'flex'; } return; 
            } else {
                 localStorage.removeItem('gAccessToken'); gAccessToken=null; 
                 document.getElementById('loginOverlay').style.display = 'flex'; return; 
            }
        }

        const data = await searchResp.json(); 
        if(data.files && data.files.length > 0) { 
            const fileId = data.files[0].id; 
            const fileResp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { 'Authorization': `Bearer ${gAccessToken}` } }); 
            const cloudContent = await fileResp.json(); 
            
            if(cloudContent) { 
                if(cloudContent.smartNotesData) {
                    allData = cloudContent.smartNotesData; 
                    localStorage.setItem(LOCAL_DATA_KEY, JSON.stringify(allData));
                }
                if(cloudContent.appGlobalPass) localStorage.setItem(APP_PASS_KEY, cloudContent.appGlobalPass); 
                else localStorage.removeItem(APP_PASS_KEY); 

                renderMainGrid(); 
                if(!silent) showNotif("تم استعادة البيانات", "success"); 
            } 
        } else { 
            if(!silent) showNotif("لا توجد بيانات محفوظة", "info"); 
        } 
    } catch(e) { if(!silent) showNotif("فشل الجلب", "error"); } 
    
    setSyncLoader(false); document.getElementById('syncText').innerText = "";
}

let notifTimer = null;
function showNotif(msg, type = 'info') { const t = document.getElementById('notifToast'); const icon = document.getElementById('notifIcon'); document.getElementById('notifMsg').textContent = msg; const colors = {success: '#10b981', error: '#ef4444', info: '#6366f1'}; t.style.background = colors[type] || colors.info; if(type === 'success') icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>'; else if(type === 'error') icon.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'; else icon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'; t.classList.add('show'); if(notifTimer) clearTimeout(notifTimer); notifTimer = setTimeout(() => t.classList.remove('show'), 2500); }
</script>
